name: Scrape Specific Rows

# Scrapes a user-supplied list of row numbers from the master xlsx
# without touching the main batch workflow.
# Output artifact:  rows-<batch>-<N1>-<N2>-... (xlsx)

on:
  workflow_dispatch:
    inputs:
      rows:
        description: 'Row numbers to scrape (space-separated, 1-based). E.g.: 609 613 616 635 678'
        required: true
        default: '609 613 616 635 678'
      batch_label:
        description: 'Label used in the artifact name (e.g. batch7)'
        required: false
        default: 'batch7'
      per_practice_timeout:
        description: 'Max seconds per practice before skipping (0 = no limit)'
        required: false
        type: choice
        options:
          - '300'
          - '180'
          - '420'
          - '600'
          - '0'
        default: '300'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            beautifulsoup4 \
            openpyxl \
            lxml \
            curl-cffi \
            playwright \
            python-dateutil
          playwright install chromium --with-deps

      - name: Run scrape_rows.py
        timeout-minutes: 90
        env:
          OXYLABS_USER: ${{ secrets.OXYLABS_USER }}
          OXYLABS_PASS: ${{ secrets.OXYLABS_PASS }}
          PRACTICE_TIMEOUT: ${{ github.event.inputs.per_practice_timeout }}
        run: |
          ROWS="${{ github.event.inputs.rows }}"
          echo "Scraping rows: $ROWS"
          # Build output filename tag from row list
          TAG=$(echo "$ROWS" | tr ' ' '_')
          python3 scrape_rows.py $ROWS --output "rows_${TAG}.xlsx"

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rows-${{ github.event.inputs.batch_label }}-${{ github.run_number }}
          path: rows_*.xlsx
          retention-days: 30
          if-no-files-found: warn
