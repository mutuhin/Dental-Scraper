name: Google Ratings Scraper

# Trigger manually after dental_scraper artifacts are ready
on:
  workflow_dispatch:
    inputs:
      places_api_key:
        description: 'Google Places API key (optional — overrides repo secret)'
        required: false
        default: ''

jobs:
  scrape_ratings:
    runs-on: ubuntu-latest
    timeout-minutes: 360        # 6 hours max — up to 6000 unique domains

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install Python dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            beautifulsoup4 \
            openpyxl \
            lxml \
            curl-cffi \
            playwright \
            python-dateutil

      # ── 4. Install Playwright browser ────────────────────────────────────────
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # ── 5. Download all batch artifacts from dental_scraper workflow ──────────
      - name: Download batch artifacts (batch-1)
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          workflow: scraper.yml
          name: batch-1
          path: artifacts/batch-1/

      - name: Download batch artifacts (batch-2 through batch-60)
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          workflow: scrape_remaining.yml
          name_is_regexp: true
          name: ^batch-\d+$
          path: artifacts/

      # ── 6. List downloaded artifacts ──────────────────────────────────────────
      - name: Show downloaded artifacts
        run: |
          echo "=== Artifact contents ==="
          find artifacts/ -name "*.xlsx" | sort || echo "No artifacts found"

      # ── 7. Run Google ratings scraper ─────────────────────────────────────────
      - name: Run Google ratings workflow
        env:
          CI: 'true'
          GOOGLE_PLACES_API_KEY: ${{ github.event.inputs.places_api_key || secrets.GOOGLE_PLACES_API_KEY }}
        run: python google_ratings_workflow.py

      # ── 8. Upload output as artifact ──────────────────────────────────────────
      - name: Upload Google ratings output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-ratings-output
          path: google_ratings_output.xlsx
          retention-days: 30
          overwrite: true
